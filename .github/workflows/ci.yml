name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Validate Docker Compose
        run: docker compose config

      - name: Validate Kubernetes overlays
        run: |
          kubectl kustomize k8s/base > /tmp/base.yaml
          kubectl kustomize k8s/overlays/production > /tmp/production.yaml

      - name: Build container image
        run: docker build -t claims-api:ci .
