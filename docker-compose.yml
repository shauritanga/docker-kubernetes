services:
  api:
    build: .
    environment:
      PORT: 8080
      APP_NAME: beginner-api-compose
      MESSAGE: Hello from Docker Compose
      DATABASE_HOST: postgres
      POSTGRES_DB: beginner_db
      POSTGRES_USER: beginner
      POSTGRES_PASSWORD: beginner
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: beginner_db
      POSTGRES_USER: beginner
      POSTGRES_PASSWORD: beginner
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beginner -d beginner_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
